- type: dungeonLevel
  id: MossyTemple1_Pvp
  parent:
  - BaseMossyTemplePostProcessDangerous
  name: ce-dungeon-mossy-dungeon-1-name
  uiPosition: 2,2
  maxEntryTime: 96 # 40% from 4 minutes (Average time to complete level)
  exits:
    1: MossyTemple2_Pvp
  config:
    !type:CEProceduralConfig
    generationPlan:
    - !type:SetRoomType
      position: 0, 0
      roomType: MossyTempleExitRoom
    - !type:AppendRoom
      roomType: MossyTempleGeneralRoom
      attachToTypes:
      - MossyTempleGeneralRoom
      - MossyTempleExitRoom
      count:
        min: 4
        max: 6
    - !type:AppendRoom
      roomType: MossyTempleEntranceRoom
      attachToTypes:
      - MossyTempleGeneralRoom
      count:
        min: 3
        max: 3
    - !type:AppendRoom
      roomType: MossyTempleBlessingRoom
      attachToTypes:
      - MossyTempleGeneralRoom
      count:
        min: 1
        max: 1
    - !type:AppendRoom
      roomType: MossyTempleTreasureRoom
      attachToTypes:
      - MossyTempleGeneralRoom
      count:
        min: 1
        max: 1
    - !type:AppendRoom
      roomType: MossyTempleSecretRoom
      attachToTypes:
      - MossyTempleGeneralRoom
      count:
        min: 0
        max: 1
    - !type:MarkDeadEnds
      ofType: MossyTempleGeneralRoom
      roomType: MossyTempleDeadEndRoom
    - !type:ConnectRandomRooms
      roomTypes:
      - MossyTempleGeneralRoom
      count:
        min: 1
        max: 2
  postProcess:
  - !type:CEMobBudgetSpawnPostProcess
    budget: 20
    entries:
    - proto: CEMobRat
      cost: 1
      weight: 2
    - proto: CEMobSlimeWater
      cost: 2
  - !type:CETableBudgetSpawnPostProcess
    table: MossyTempleHerbs
    budget: 5
  - !type:CETableBudgetSpawnPostProcess
    table: MossyTempleKeys
    budget: 2
  - !type:CETableBudgetSpawnPostProcess
    table: MossyTempleHealing
    budget: 50
  - !type:CETableBudgetSpawnPostProcess
    table: MossyTempleMana
    budget: 10
  - !type:CEEntityTableBudgetSpawnPostProcess
    entries:
    - table: !type:CEMoneySelector
        max: 50
        min: 25
        largeCoinChance: 0.3
      cost: 1
    budget: 1
