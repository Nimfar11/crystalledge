      - MossyTempleGeneralRoom
      count:
        min: 1
        max: 1
    - !type:AppendRoom
      roomType: MossyTempleTreasureRoom
      attachToTypes:
      - MossyTempleGeneralRoom
      count:
        min: 0
        max: 2
    - !type:AppendRoom
      roomType: MossyTempleSecretRoom
      attachToTypes:
      - MossyTempleGeneralRoom
      count:
        min: 0
        max: 1
    - !type:AppendRoom
      roomType: MossyTempleAlchemyRoom
      attachToTypes:
      - MossyTempleGeneralRoom
      count:
        min: 1
        max: 1
    - !type:MarkDeadEnds
      ofType: MossyTempleGeneralRoom
      roomType: MossyTempleDeadEndRoom
