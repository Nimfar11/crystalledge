# Round-start dungeon level. Auto-generated by CEDungeonInstanceSystem on RoundStartingEvent
# (singleton, persistent). Players spawn here via the spawn points embedded in the underlying
# zMap, since the default game map (`Empty`) has no spawn points of its own.
- type: dungeonLevel
  id: MossyTempleStart
  roundstart: true
  stable: true
  icon:
    sprite: _CE/Interface/NodeTree/demiplane_map.rsi
    state: center
  name: ce-dungeon-start-name
  uiPosition: 0,1
  exits:
    1: MossyTemple1
    2: MossyTemple1_Pvp
    3: Tutorial
  config:
    !type:CERandomZNetworkConfig
    variants:
      Start: 1

- type: zMap
  id: Start
  maps:
  - /Maps/_CE/Dungeon/Start/Start0.yml
  - /Maps/_CE/Dungeon/Start/Start1.yml
  components:
    - type: SunShadowCycle
      offset: 490
    - type: LightCycle
      offset: 490
      originalColor: "#c8fdff"
    - type: CEZLevelMapRoof
    - type: SunShadow
    - type: MapLight
      ambientLightColor: "#c8fdff"
    - type: CEMapStatusEffects
      effects:
      - CEStatusEffectPacifismStrong
