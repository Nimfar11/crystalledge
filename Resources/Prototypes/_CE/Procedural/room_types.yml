- type: dungeonRoomType
  id: MossyTempleGeneralRoom
  supportsWideConnection: true
  color: "#CCCCCC"

- type: dungeonRoomType
  id: MossyTempleExitRoom
  supportsWideConnection: true
  color: "#5f2f89"
  minimapIcon:
    sprite: /Textures/_CE/Interface/minimap_icons.rsi
    state: exit

- type: dungeonRoomType
  id: MossyTempleEntranceRoom
  supportsWideConnection: true
  secretRoom: true #Intended
  color: "#4b944b"
  minimapIcon:
    sprite: /Textures/_CE/Interface/minimap_icons.rsi
    state: enter

- type: dungeonRoomType
  id: MossyTempleBlessingRoom
  supportsWideConnection: true
  color: "#6495ED"
  minimapIcon:
    sprite: /Textures/_CE/Interface/minimap_icons.rsi
    state: blessing

- type: dungeonRoomType
  id: MossyTempleTreasureRoom
  doorPrototype: CEGoldenLockedDoor
  supportsWideConnection: false
  showIconFromNeighbour: true
  color: "#FFD700"
  minimapIcon:
    sprite: /Textures/_CE/Interface/minimap_icons.rsi
