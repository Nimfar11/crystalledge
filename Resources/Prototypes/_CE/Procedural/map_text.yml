- type: entity
  id: CEMapEndText
  parent: MapText
  categories: [ ForkFiltered ]
  name: Map end text
  components:
  - type: MapText
    text: "This is the end of the demo! Thanks for playing :). \n The next level will be incredibly, absurdly difficult—meaning you'll most likely die."


- type: entity
  id: CEMapStartText
  parent: MapText
  categories: [ ForkFiltered ]
  name: Map start text EN
  components:
  - type: MapText
    text: "A maximum of 4 players can enter the portal at the same time. \nA short demo adventure awaits you, spanning 4 floors that gradually get more challenging. \nYou may randomly encounter other groups of players inside, and it’s up to you to decide whether you’re friends or foes.\nOn each level, there is 1 statue that will boost your character’s stats.\nYour goal is to reach the end and have fun!"

- type: entity
  id: CEMapStartBlockedText
  parent: MapText
  categories: [ ForkFiltered ]
  name: Map blocked text
  components:
  - type: MapText
    text: "The playtest is coming to an end. You can no longer start new runs. \nWe’re waiting for players to finish their adventures before shutting down the server."

- type: entity
  id: CEMapStartNotStartedText
  parent: MapText
  categories: [ ForkFiltered ]
  name: Map not started text
  components:
  - type: MapText
    text: "The playtest hasn't started yet. Please wait..."

