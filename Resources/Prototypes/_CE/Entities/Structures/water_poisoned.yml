- type: entity
  parent: CEWater
  id: CEWaterPoisoned
  suffix: Poisoned
  name: poisoned water
  description: This water has been contaminated with a dangerous substance.
  components:
  - type: Sprite
    sprite: _CE/Structures/Nature/water_poisoned.rsi
    state: static
  - type: CEEntityEffectOnCollide
    effects:
    - !type:ApplyStatusEffectStack
      statusEffect: CEStatusEffectWet
      amount: 1
      max: 10
    - !type:ApplyStatusEffectStack
      statusEffect: CEStatusEffectPoison
      amount: 1
      max: 5
  - type: CETileEffectTransform
    transforms:
      CETileEffectFreeze: CEIcePoisoned
  - type: CEInnateStatusEffect
    components:
    - type: CEEffectOnFallenOnStatusEffect
      scaleWithStacks: false
      scaleWithSpeed: true
      effects:
      - !type:CETileAffectArea
        effectTarget: User
        tileEffect: CETileEffectWater
        radius: 0.5
        fallOffFactor: 0.5
        maxStacks: 3
      - !type:AreaEffect
        effectTarget: User
        range: 1
        effects:
        - !type:ApplyStatusEffectStack
          statusEffect: CEStatusEffectPoison
          amount: 2
          max: 5
  - type: RandomSpawner
    prototypes: []

- type: entity
  parent: CEWaterPoisoned
  id: CEWaterPoisonedMoving
  suffix: Moving
  components:
  - type: Sprite
    state: moving
    snapCardinals: false
  - type: CETileDistortion
    intensity: 0.6
  - type: CEAutoConveyor
  - type: CETileEffectTransform
    transforms:
      CETileEffectFreeze: CEIceFrozenPoisonedStream
  - type: Conveyor
    speed: 0.25

- type: entity
  parent: CEIce
  id: CEIcePoisoned
  suffix: Poisoned
  components:
  - type: CETileEffectTransform
    transforms:
      CETileEffectFire: CEWaterPoisoned
      CETileEffectCursedFire: CEWaterPoisoned

- type: entity
  parent: CEIcePoisoned
  id: CEIceFrozenPoisonedStream
  suffix: Poisoned Frozen Stream
  description: A frozen stream, the current trapped under ice.
  components:
  - type: CETileEffectTransform
    transforms:
      CETileEffectFire: CEWaterPoisonedMoving
      CETileEffectCursedFire: CEWaterPoisonedMoving
