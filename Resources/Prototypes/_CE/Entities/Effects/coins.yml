- type: entity
  id: CEEffectCoinBase
  parent: CEBaseMagicImpact
  categories: [ ForkFiltered ]
  abstract: true
  name: coin sparkle
  suffix: VFX
  save: false
  components:
  - type: Sprite
    drawdepth: Effects
    noRot: true
    sprite: _CE/Effects/sparkle_coin.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    radius: 1.5
  - type: LightBehaviour
    behaviours:
      - !type:PulseBehaviour
        interpolate: Linear
        maxDuration: 1.5
        startValue: 0
        endValue: 5.0
        property: Energy
        isLooped: false
        enabled: true
  - type: TimedDespawn
    lifetime: 1.5

- type: entity
  id: CEEffectCoinPlatinim
