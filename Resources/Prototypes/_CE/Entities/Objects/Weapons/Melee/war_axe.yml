- type: entity
  id: CEWeaponWarAxeIron
  parent: CEBaseWeapon
  name: iron war axe
  description: A large and heavy iron war axe. Heavy means reliable.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/WarAxe/iron.rsi
    state: icon
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.84
        arcWidth: 40
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 30
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.84
        arcWidth: 80
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 20
    animations:
      Primary:
      - anim: WarAxeAttackLight
      - anim: WarAxeAttackLight2
      Secondary:
      - anim: WarAxeAttackHeavy1
        speed: 0.5
      - anim: WarAxeAttackHeavy2
        speed: 0.5
  #- type: CEWieldedWeapon
  #  animations:
  #    Primary:
  #    - anim: WarAxeAttackLight
  #    - anim: WarAxeAttackLight2
  #    Secondary:
  #    - anim: WarAxeAttackLight
  #    - anim: WarAxeAttackLight2
  - type: CEWeaponStaminaCost
    costs:
      Primary: 2
      Secondary: 2
  - type: Clothing
    slots:
    - neck
  - type: Wieldable
