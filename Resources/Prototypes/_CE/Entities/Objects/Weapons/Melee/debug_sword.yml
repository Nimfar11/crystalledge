- type: entity
  id: CEWeaponSwordDebug
  parent: CEBaseSword
  name: admin sword
  description: INFINITY POWER
  suffix: DEBUG
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Sword/bone.rsi
    color: "#ee00ff"
    state: icon
  - type: CEWeapon
    range: 0.7
    effectSlots:
      OnHit:
      - !type:Damage
        attackType: Melee
        damage:
          types:
            Physical: 100
      OnHeavyHit:
      - !type:Damage
        attackType: Melee
        damage:
          types:
            Physical: 150
    animations:
      Primary:
      - anim: SwordAttackLight1
      - anim: SwordAttackLight2
      Secondary:
      - anim: SpearAttackHeavy2
        speed: 1.2
  - type: Clothing
    slots:
    - neck
