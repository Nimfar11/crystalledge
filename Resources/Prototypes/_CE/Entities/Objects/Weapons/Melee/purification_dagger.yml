- type: entity
  parent: CEBaseWeapon
  id: CEWeaponDaggerPurification
  name: purification dagger
  description: An enchanted dagger that cleanses the target of all negative status effects.
  components:
  - type: Item
    shape:
    - 0, 0, 1, 1
  - type: Sprite
    sprite: _CE/Objects/Weapons/Dagger/purification_dagger.rsi
    state: icon
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.4
        arcWidth: 40
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 5
        - !type:CleanDebuffs
      OnHeavyHit: # Apply this effect of self
      - !type:Damage
        attackType: Melee
        effectTarget: User
        ignoreArmor: true
        damage:
          types:
            Physical: 5
      - !type:CleanDebuffs
    animations:
      Primary:
      - anim: DaggerAttackLight1
        speed: 1.5
      - anim: DaggerAttackLight2
        speed: 1.5
      Secondary:
      - anim: SelfCut
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
  - type: Clothing
    slots:
    - belt
