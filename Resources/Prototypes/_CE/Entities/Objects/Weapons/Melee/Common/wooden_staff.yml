- type: entity
  parent: CEBaseWeapon
  id: CEWeaponStaffWooden
  name: wooden staff
  description: A long wooden stick with an iron tip.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Staff/wooden.rsi
    state: icon
  - type: CEWeapon
    range: 0.6
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        arcWidth: 100
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 10
      OnHeavyHit:
      - !type:WeaponArcAttack
        rangeMultiplier: 1.3
        arcWidth: 45
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 5
    animations:
      Primary:
      - anim: StaffAttackLight1
      - anim: StaffAttackLight2
      Secondary:
      - anim: StaffAttackHeavy
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 1
  - type: Clothing
    slots:
    - neck
  - type: Wieldable
