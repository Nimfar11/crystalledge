- type: entity
  id: CEWeaponTwoHandedSwordIron
  parent: CEBaseWeapon
  name: iron two-handed sword
  description: A large and heavy two-handed sword. Heavy means reliable.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/TwoHandedSword/iron.rsi
    state: icon
  - type: CEWeapon
    range: 0.84
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        arcWidth: 40
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 25
      OnHeavyHit:
      - !type:WeaponArcAttack
        rangeMultiplier: 1.071
        arcWidth: 40
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 25
    animations:
      Primary:
      - anim: WarAxeAttackLight
        speed: 0.6
      - anim: WarAxeAttackLight2
        speed: 0.6
      Secondary:
      - anim: SpearAttackHeavy
        speed: 0.6
      - anim: SpearAttackHeavy2
        speed: 0.6
  - type: CEWeaponStaminaCost
    costs:
      Primary: 2
      Secondary: 2.5
  - type: CEWieldedWeapon
    animations:
      Primary:
      - anim: WarAxeAttackLight
      - anim: WarAxeAttackLight2
      Secondary:
      - anim: SpearAttackHeavy
      - anim: SpearAttackHeavy2
  - type: Clothing
    slots:
    - neck
  - type: Wieldable
