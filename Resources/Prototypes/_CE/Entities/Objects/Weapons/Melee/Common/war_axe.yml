      Primary:
      - anim: WarAxeAttackLight
      - anim: WarAxeAttackLight2
      Secondary:
      - anim: WarAxeAttackHeavy1
      - anim: WarAxeAttackHeavy2
  - type: CEWeaponStaminaCost
    costs:
      Primary: 2
