- type: entity
  id: CEWeaponSpearIron
  parent: CEBaseWeapon
  name: iron spear
  description: A long iron-tipped spear. Excellent reach keeps enemies at bay.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Spear/iron.rsi
    state: icon
  - type: CEWeapon
    range: 1.26
    effectSlots:
      OnHit:
      - !type:Damage
        attackType: Melee
        damage:
          types:
            Physical: 7
      OnHeavyHit:
      - !type:Damage
        attackType: Melee
        damage:
          types:
            Physical: 15
    animations:
      Primary:
      - anim: SpearAttackLight
        speed: 0.6
      Secondary:
      - anim: SpearAttackHeavy
        speed: 0.6
      - anim: SpearAttackHeavy2
        speed: 0.6
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 2
  - type: CEWieldedWeapon
    animations:
      Primary:
      - anim: SpearAttackLight
      Secondary:
      - anim: SpearAttackHeavy
      - anim: SpearAttackHeavy2
  - type: Wieldable
  - type: Clothing
    slots:
    - neck
  - type: CELootCategory
    tags:
    - tag: CEWeapon
      weight: 1.0
