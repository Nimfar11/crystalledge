- type: entity
  id: CEWeaponSpearIron
  parent: CEBaseWeapon
  name: iron spear
  description: A long iron-tipped spear. Excellent reach keeps enemies at bay.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Spear/iron.rsi
    state: icon
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 1.26
        arcWidth: 15
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 7
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 1.4
        arcWidth: 25
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 15
    animations:
      Primary:
      - anim: SpearAttackLight
        speed: 0.6
      Secondary:
      - anim: SpearAttackHeavy
        speed: 0.6
      - anim: SpearAttackHeavy2
        speed: 0.6
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 2
  - type: CEWieldedWeapon
    animations:
      Primary:
      - anim: SpearAttackLight
      Secondary:
      - anim: SpearAttackHeavy
      - anim: SpearAttackHeavy2
  - type: Wieldable
  - type: Clothing
    slots:
    - neck
