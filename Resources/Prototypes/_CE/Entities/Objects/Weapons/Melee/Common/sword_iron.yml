- type: entity
  id: CEWeaponSwordIron
  parent: CEBaseSword
  name: iron sword
  description: A finely crafted sword favored by imperial officers. Its blade gleams with authority and tradition.
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Sword/iron.rsi
    state: icon
  - type: CEWeapon
    range: 0.7
    effectSlots:
      OnHit:
      - !type:Damage
        attackType: Melee
        damage:
          types:
            Physical: 10
      OnHeavyHit:
      - !type:Damage
        attackType: Melee
        damage:
          types:
            Physical: 10
    animations:
      Primary:
      - anim: SwordAttackLight1
      - anim: SwordAttackLight2
      Secondary:
      - anim: SwordAttackHeavy1
        speed: 1.2
      - anim: SwordAttackHeavy2
        speed: 1.2
