- type: entity
  id: CEWeaponSwordBone
  parent: CEBaseSword
  name: bone sword
  description: Nicks on the blade leave bruise wounds, increasing the damage dealt to the target
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Sword/bone.rsi
    state: icon
  - type: CEWeapon
    range: 0.7
    effectSlots:
      OnHit:
      - !type:Damage
        attackType: Melee
        damage:
          types:
            Physical: 7
      - !type:ApplyStatusEffectStack
        statusEffect: CEStatusEffectBruise
        amount: 1
        max: 10
      OnHeavyHit:
      - !type:Damage
        attackType: Melee
        damage:
          types:
            Physical: 10
      - !type:ApplyStatusEffectStack
        statusEffect: CEStatusEffectBruise
        amount: 2
        max: 10
    animations:
      Primary:
      - anim: SwordAttackLight1
      - anim: SwordAttackLight2
      Secondary:
      - anim: SpearAttackHeavy2
        speed: 1.2
