- type: entity
  id: CEWeaponSpearSoulCatcher
  parent: CEBaseWeapon
  name: energy catcher
  description: A rare magical weapon that does not deal physical damage but wounds the soul, draining mana from it and transferring it to the wielder
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Spear/soul_catcher.rsi
    layers:
    - state: icon
    - state: blade
      shader: unshaded
  - type: CEWeapon
    range: 1.26
    effectSlots:
      OnHit:
      - !type:Damage
        attackType: Melee
        damage:
          types:
            Cold: 5
      - !type:ConditionalEffectGroup
        conditions:
        - !type:ManaPercentCondition
          max: 0
          inverted: true
        effects:
        - !type:StealMana
          amount: 10
        - !type:SpawnEntity
          effectTarget: Target
          reparent: true
          spawns:
          - CEEffectManaDrain
      OnHeavyHit:
      - !type:Damage
        attackType: Melee
        damage:
          types:
            Cold: 10
      - !type:ConditionalEffectGroup
        conditions:
        - !type:ManaPercentCondition
          max: 0
          inverted: true
        effects:
        - !type:StealMana
          amount: 20
        - !type:SpawnEntity
          effectTarget: Target
          reparent: true
          spawns:
          - CEEffectManaDrain
    animations:
      Primary:
      - anim: SpearAttackLight
        speed: 0.6
      Secondary:
      - anim: SpearAttackHeavy
        speed: 0.6
      - anim: SpearAttackHeavy2
        speed: 0.6
  - type: CEWieldedWeapon
    animations:
      Primary:
      - anim: SpearAttackLight
      Secondary:
      - anim: SpearAttackHeavy
      - anim: SpearAttackHeavy2
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 2
  - type: Wieldable
  - type: Clothing
    slots:
    - neck
