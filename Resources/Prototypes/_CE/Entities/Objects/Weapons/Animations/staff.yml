#MARK: Light 1
- type: entityEffectAnimation
  id: StaffAttackLight1
  movementSpeed: 0.3
  duration: 0.4
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/firebolt.ogg
    - !type:UsedEntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: -0.4, -0.1
      - time: 0.1
        offset: -0.1, -0.7
      - time: 0.2
        offset: 0.1, -0.65
      - time: 0.3
        offset: 0.1, -0.35

      rotationAnimation:
      - time: 0.0
        rotation: -150
      - time: 0.1
        rotation: -30
      - time: 0.2
        rotation: 30
      - time: 0.3
        rotation: -40

      colorAnimation:
      - time: 0.0
        color: "#ffffff"
      - time: 0.2
        color: "#ffffff"
        easing: QuadOut
      - time: 0.35
        color: "#ffffff00"
    - !type:WeaponEffectSlot
      slot: OnSwing
    - !type:WeaponArcAttack
      arcWidth: 100
      angle: -20
      effects:
      - !type:WeaponEffectSlot
        slot: OnHit

#MARK: Light 2
- type: entityEffectAnimation
  id: StaffAttackLight2
  movementSpeed: 0.3
  duration: 0.4
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/firebolt.ogg
    - !type:UsedEntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: 0.4, -0.1
      - time: 0.1
        offset: 0.1, -0.7
      - time: 0.2
        offset: -0.1, -0.65
      - time: 0.3
        offset: -0.1, -0.35

      rotationAnimation:
      - time: 0.0
        rotation: 150
      - time: 0.1
        rotation: 30
      - time: 0.2
        rotation: -30
      - time: 0.3
        rotation: 40

      colorAnimation:
      - time: 0.0
        color: "#ffffff"
      - time: 0.2
        color: "#ffffff"
        easing: QuadOut
      - time: 0.35
        color: "#ffffff00"
    - !type:WeaponEffectSlot
      slot: OnSwing
    - !type:WeaponArcAttack
      arcWidth: 100
      angle: 20
      effects:
      - !type:WeaponEffectSlot
        slot: OnHit

#MARK: Heavy 1
- type: entityEffectAnimation
  id: StaffAttackHeavy
  movementSpeed: 0.4
  duration: 0.55
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash_wooden4.ogg
    - !type:Dash
      distance: -0.5
    - !type:WeaponEffectSlot
      slot: OnHeavySwing
    - !type:WeaponArcAttack
      arcWidth: 45
      rangeMultiplier: 1.3
      effects:
      - !type:WeaponEffectSlot
        slot: OnHeavyHit
    - !type:UsedEntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: -0.3, -0.1
        easing: QuadIn
      - time: 0.05
        offset: -0.1, -0.5
      - time: 0.1
        offset: 0, -0.9
      - time: 0.15
        offset: 0.1, -0.5
      - time: 0.2
        offset: 0.3, -0.1
        easing: QuadOut

      rotationAnimation:
      - time: 0.0
        rotation: -30
        easing: QuadIn
      - time: 0.1
        rotation: 0
      - time: 0.2
        rotation: 30
#
      colorAnimation:
      - time: 0.3
        color: "#ffffff"
        easing: QuadOut
      - time: 0.4
        color: "#ffffff00"  # Fade out
