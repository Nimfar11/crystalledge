- type: entityEffectAnimation
  id: DaggerAttackLight1
  movementSpeed: 0.3
  duration: 0.4
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash.ogg
    - !type:UsedEntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: -0.3, -0.1
        easing: QuadIn
      - time: 0.1
        offset: -0.2, -0.5
        easing: QuadOut
      - time: 0.25
        offset: 0.3, -0.3
        easing: QuadOut

      rotationAnimation:
      - time: 0.0
        rotation: 20
      - time: 0.1
        rotation: 0
      - time: 0.25
        rotation: -20

      colorAnimation:
      - time: 0.0
        color: "#ffffff"
        easing: Linear
      - time: 0.2
        color: "#ffffff"
        easing: QuadOut
      - time: 0.3
        color: "#ffffff00"  # Fade out

      scaleAnimation:
      - time: 0.0
        scale: 1, -1
    0.1:
    - !type:WeaponEffectSlot
      slot: OnHit

- type: entityEffectAnimation
  id: DaggerAttackLight2
  movementSpeed: 0.3
  duration: 0.4
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash.ogg
    - !type:UsedEntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: 0.3, -0.1
        easing: QuadIn
      - time: 0.1
        offset: 0.2, -0.5
        easing: QuadOut
      - time: 0.25
        offset: -0.3, -0.3
        easing: QuadOut

      rotationAnimation:
      - time: 0.0
        rotation: -20
      - time: 0.1
        rotation: 0
      - time: 0.25
        rotation: 20

      colorAnimation:
      - time: 0.0
        color: "#ffffff"
        easing: Linear
      - time: 0.2
        color: "#ffffff"
        easing: QuadOut
      - time: 0.3
        color: "#ffffff00"  # Fade out

      scaleAnimation:
      - time: 0.0
        scale: 1, 1
    0.1:
    - !type:WeaponEffectSlot
      slot: OnHit

- type: entityEffectAnimation
  id: SelfCut
  movementSpeed: 0.6
  duration: 0.4
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash_sword2.ogg
    - !type:UsedEntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: 0, -0.5
        easing: QuadOut
      - time: 0.2
        offset: 0, -0.7
        easing: QuadIn
      - time: 0.5
        offset: 0, -0
      - time: 0.6
        offset: 0, -0.3

      rotationAnimation:
      - time: 0.0
        rotation: -180

      colorAnimation:
      - time: 0.5
        color: "#ffffff"
      - time: 0.6
        color: "#ffffff00"  # Fade out
        easing: QuadOut
    0.39:
    - !type:WeaponEffectSlot
      slot: OnHeavyHit


- type: entityEffectAnimation
  id: DaggerAttackHeavy
  movementSpeed: 0.5
  duration: 0.6
  events:
    0:
    - !type:Dash
      distance: 1
    - !type:UsedEntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: -0.3, -0.3
        easing: QuadIn
      - time: 0.4
        offset: -0.2, 0.3
      - time: 0.45
        offset: -0.3, -0.3
      - time: 0.55
        offset: 0, -1.0
        easing: QuadIn
      - time: 0.75
        offset: 0, -0.8
        easing: QuadOut

      rotationAnimation:
      - time: 0.0
        rotation: 0
        easing: QuadIn
      - time: 0.4
        rotation: -15
      - time: 0.45
        rotation: 0
      - time: 0.55
        rotation: 5
        easing: QuadIn

      colorAnimation:
      - time: 0.65
        color: "#ffffff"
        easing: QuadOut
      - time: 0.8
        color: "#ffffff00"

      scaleAnimation:
      - time: 0.0
        scale: 1, -1
    0.15:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash_sword1.ogg
    0.55:
    - !type:WeaponEffectSlot
      slot: OnHeavyHit
