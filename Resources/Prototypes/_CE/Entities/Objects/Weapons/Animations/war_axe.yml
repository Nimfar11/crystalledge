- type: entityEffectAnimation
  id: WarAxeAttackLight
  movementSpeed: 0.4
  duration: 0.9
  events:
    0:
    - !type:UsedEntityAnimation
      offsetAnimation:
      - time: 0.0
        offset: 0.1, 0.5
        easing: QuadOut
      - time: 0.6
        offset: 0.4, 1
        easing: QuadIn
      - time: 0.8
        offset: 0, -1
      - time: 1
        offset: 0, -1
        easing: QuadIn
      - time: 1.4
        offset: -0.1, -0.3
      rotationAnimation:
      - time: 0.0
        rotation: -180
        easing: QuadOut
      - time: 0.6
        rotation: -220
        easing: QuadIn
      - time: 0.8
        rotation: -360
        easing: QuadIn
      - time: 0.9
        rotation: -360
        easing: QuadIn
      - time: 1.4
        rotation: -380
      colorAnimation:
      - time: 0.0
        color: "#ffffff"
        easing: Linear
      - time: 1
        color: "#ffffff"
        easing: QuadOut
      - time: 1.4
        color: "#ffffff00"  # Fade out
    0.4:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/Weapon/slash_sword2.ogg
    - !type:SpawnEntity
      offset: 0, -1.5
      spawns:
      - CEDustTileEffect
    0.8:
    - !type:WeaponEffectSlot
      slot: OnHit

