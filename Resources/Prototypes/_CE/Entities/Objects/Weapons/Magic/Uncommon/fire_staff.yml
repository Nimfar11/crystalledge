- type: entity
  parent: CEBaseWeapon
  id: CEWeaponMagicStaffFireball
  name: staff of fireballs
  description: I CAST FIREBALL
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Staff/fire_staff.rsi
    layers:
    - state: icon
    - state: orb
      shader: unshaded
  - type: CEWeapon
    effectSlots:
      OnSwing:
      - !type:ShootProjectile
        prototype: CEProjectileStaffFirebolt
        projectileSpeed: 10
      OnHeavySwing:
      - !type:ShootProjectile
        prototype: CEProjectileStaffFirebolt
        projectileSpeed: 10
        projectileMaxSpeed: 5
        projectileCount: 3
        spread: 0.2
    animations:
      Primary:
      - anim: StaffAttackLight1
      - anim: StaffAttackLight2
      Secondary:
      - anim: StaffAttackHeavy
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 3
  - type: CEWeaponManaCost
    costs:
      Primary: 10
      Secondary: 30
  - type: CEMagicEnergyContainer
    maxEnergy: 70
  - type: CEMagicEnergyExaminable
  - type: Clothing
    slots:
    - neck
  - type: CELootCategory
    tags:
    - tag: CEWeapon
      weight: 0.5


- type: entity
  id: CEProjectileStaffFirebolt
  name: firebolt projectile
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/firebolt.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ff9603"
    radius: 2.0
    energy: 5.0
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      attackType: Ranged
      damage:
        types:
          Fire: 20
    - !type:CETileAffectArea
      effectTarget: Used
      tileEffect: CETileEffectFire
      radius: 2
      maxStacks: 6
    - !type:SpawnEntity
      effectTarget: Used
      spawns:
      - CEEffectPotionAlchemicalFire
    - !type:ShockWaveVFX
      effectTarget: Used
      width: 0.1
