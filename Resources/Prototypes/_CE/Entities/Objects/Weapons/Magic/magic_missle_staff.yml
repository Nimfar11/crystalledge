- type: entity
  parent: CEBaseWeapon
  id: CEWeaponMagicStaffMagicMissile
  name: magic missile staff
  description: "A mage's standard weapon that fires compressed beams of energy."
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Staff/magic_missile_staff.rsi
    layers:
    - state: icon
    - state: orb
      shader: unshaded
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:ShootProjectile
        prototype: CEProjectileMagicMissile
        projectileSpeed: 10
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.78
        arcWidth: 45
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 5
    animations:
      Primary:
      - anim: StaffAttackLight1
      - anim: StaffAttackLight2
      Secondary:
      - anim: StaffAttackHeavy
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 1
  - type: CEWeaponChargesCost
    costs:
      Primary: 1
  - type: CECharges
    maxCharges: 40
    currentCharges: 40
  - type: Clothing
    slots:
    - neck

- type: entity
  id: CEProjectileMagicMissile
  name: magic missile
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/magic_missile.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ffffff"
    radius: 1.5
    energy: 3.0
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      attackType: Ranged
      damage:
        types:
          Physical: 5
