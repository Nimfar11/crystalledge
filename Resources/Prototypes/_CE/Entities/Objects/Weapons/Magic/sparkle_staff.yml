- type: entity
  parent: CEBaseWeapon
  id: CEWeaponMagicStaffSparkle
  name: fire sparkle staff
  description: The simplest magical weapon that shoots hot sparks
  components:
  - type: Sprite
    sprite: _CE/Objects/Weapons/Staff/sparkle_staff.rsi
    layers:
    - state: icon
    - state: orb
      shader: unshaded
  - type: CEWeapon
    effectSlots:
      OnHit:
      - !type:ShootProjectile
        prototype: CEProjectileMagicSparkle
        projectileSpeed: 10
      OnHeavyHit:
      - !type:WeaponArcAttack
        range: 0.78
        arcWidth: 45
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 5
    animations:
      Primary:
      - anim: StaffAttackLight1
      - anim: StaffAttackLight2
      Secondary:
      - anim: StaffAttackHeavy
  - type: CEWeaponStaminaCost
    costs:
      Primary: 1
      Secondary: 1
  - type: CEWeaponChargesCost
    costs:
      Primary: 1
  - type: CECharges
    maxCharges: 40
    currentCharges: 40
  - type: Clothing
    slots:
    - neck

- type: entity
  id: CEProjectileMagicSparkle
  name: fire bolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/StatusEffects/fire_status.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#ff9603"
    radius: 1.5
    energy: 3.0
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      attackType: Ranged
      damage:
        types:
          Fire: 5
