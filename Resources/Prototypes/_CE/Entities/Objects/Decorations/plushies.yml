- type: entity
  id: CEPlushieBase
  parent: BasePlushie
  abstract: true
  categories: [ ForkFiltered ]
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _CE/Objects/Decorations/plushies.rsi
  - type: CELootCategory
    tags:
    - tag: CEPlushie
      weight: 1.0

- type: entity
  id: CEPlushieHuman
