
- type: entity
  id: CEConsumablePotionFrost
  parent:
  - CEConsumablePotionBase
  - CEPotionMedium
  name: frost potion
  description: TODO
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: fill
      color: "#00ccff"
    - sprite: _CE/Effects/cold_slowdown_status.rsi
      state: effect
      shader: unshaded
  - type: CEConsumable
    effects:
    - !type:ApplyStatusEffectStack
      statusEffect: CEStatusEffectColdSlowdown
      amount: 6
    - !type:SpawnEntity
      spawns:
      - CEEffectHealingGeneric
  - type: CEDestructionEffect
    effects:
    - !type:CETileAffectArea
      tileEffect: CETileEffectFreeze
      radius: 2
      maxStacks: 6
    - !type:AreaEffect
      range: 2
      effects:
      - !type:Damage
        attackType: Ranged
        damage:
          types:
            Cold: 20
  - type: CEDestructible
  - type: PointLight
    color: "#00d9ff"
    radius: 1.3
    energy: 10
