- type: entity
  id: CEConsumablePotionPhysicalShield
  parent:
  - CEConsumablePotionBase
  - CEPotionCube
  name: potion of physical protection
  description: A thick, metallic brew that coats the body in a shimmering barrier. Grants temporary shields against physical damage.
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: fill
      color: "#b2e3eb"
  - type: CEConsumable
    effects:
    - !type:ApplyStatusEffectStack
      statusEffect: CEStatusEffectTempShield
      amount: 30
  - type: CEDestructionEffect
    effects:
    - !type:AreaEffect
      range: 1
      whitelist:
        components:
        - CEMobState
      effects:
      - !type:ApplyStatusEffectStack
        statusEffect: CEStatusEffectTempShield
        amount: 15
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectAreaHealingEffect
  - type: CEDestructible

