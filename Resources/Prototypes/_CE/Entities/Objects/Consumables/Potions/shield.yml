- type: entity
  id: CEConsumablePotionShield
  parent:
  - CEConsumablePotionBase
  - CEPotionCube
  name: potion of stone skin
  description: A thick, metallic brew that coats the body in a shimmering barrier. Grants temporary shields against damage.
  components:
  - type: Sprite
    layers:
    - state: icon
    - state: fill
      color: "#43cde2"
  - type: CEConsumable
    effects:
    - !type:ApplyStatusEffectStack
      statusEffect: CEStatusEffectTempShield
      amount: 30
  - type: CEDestructionEffect
    effects:
    - !type:AreaEffect
      range: 1
      whitelist:
        components:
        - CEMobState
        - CEGOAP
      effects:
      - !type:ApplyStatusEffectStack
        statusEffect: CEStatusEffectTempShield
        amount: 15
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectAreaHealingEffect
  - type: CEDestructible