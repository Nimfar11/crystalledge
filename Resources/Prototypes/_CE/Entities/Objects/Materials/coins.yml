- type: entity
  id: CECoinBase
  parent: BaseItem
  abstract: true
  categories: [ ForkFiltered ]
  components:
  - type: Item
    size: Tiny
  - type: Stack
    baseLayer: base
    layerStates:
    - coin0
    - coin1
    - coin2
    - coin3
    - coin4
    - coin5
    - coin6
    - coin7
    - coin8
    - coin9
    - coin10
  - type: Appearance
  - type: CECurrency
  - type: CECurrencyExaminable
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_CE/Effects/coins_fall.ogg
  - type: EmitSoundOnDrop
    sound:
      collection: CECoins
  - type: EmitSoundOnPickup
    sound:
      collection: CECoins
  - type: CEEmitSoundOnStackMerge
    sound:
      collection: CECoins
  - type: Tag
    tags:
    - CECoin
  - type: CECollectOnContact
    storageTag: CEWallet
  - type: CEShiny
    radius: 0.2
    minFrequency: 2
    maxFrequency: 6
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        hard: false
        mask:
        - MobLayer
        layer:
        - MobLayer
      fix2: # Hard collision to prevent flying throught walls
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        mask:
        - LowImpassable
  - type: CENavIgnore
  - type: CollisionWake
    enabled: false

# Copper

- type: entity
  id: CECoinCopper1
  parent: CECoinBase
  name: copper coin
  description: The smallest denomination coin. Copper.
  suffix: 1 coin
  components:
  - type: Sprite
    sprite: /Textures/_CE/Objects/Materials/Currency/coin_cp.rsi
    layers:
    - state: coin10
      map: ["base"]
  - type: Stack
    stackType: CECoinCopper
    count: 1
  - type: CEStackPrice
    price: 1
  - type: CEShiny
    effect: CEEffectCoinCopper

- type: entity
  id: CECoinCopper5
  parent: CECoinCopper1
  suffix: 5 coins
  components:
  - type: Sprite
    state: coin5
  - type: Stack
    count: 5

- type: entity
  id: CECoinCopper10
  parent: CECoinCopper1
  suffix: 10 coins
  components:
  - type: Sprite
    state: coin1
  - type: Stack
    count: 10

