- type: entity
  parent:
  - BaseMob
  - CEMobDamageable
  - CEMobCombat
  - CEMobGOAPBase
  id: CEMobSlimeFire
  name: fire slime
  description: A wobbly blob of animated fire. Pops into a burst of flames when destroyed.
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _CE/Mobs/slime.rsi
    layers:
    - map: [ "base", "movement" ]
      state: base
      color: "#ff4a08"
      shader: unshaded
  - type: CEGOAPAlarm
    sound:
      path: /Audio/_CE/Mobs/slime_alert.ogg
      params:
        variation: 0.1
  - type: CESpawnAnimation
    animation: FireSlimeSpawn
  - type: CEAnimationController
  - type: CEIdleAnimation
    animation:
      scaleAnimation:
      - time: 0.0
        scale: 1.1, 0.9
      - time: 0.5
        scale: 0.9, 1.1
      - time: 1.0
        scale: 1.1, 0.9
  - type: CEDestructible
    destroyThreshold: 25
    lootTable: !type:AllSelector
      children:
      - id: CEConsumableSlimeCoreFire
        amount: 1
        prob: 0.75
  - type: CEDestructionEffect
    effects:
    - !type:CETileAffectArea
      tileEffect: CETileEffectFire
      radius: 1
      maxStacks: 4
      fallOffFactor: 0.5
  - type: CEGOAP
    goals:
    - desiredState:
        EnemyDead: true
      priority: 1
    actions:
    - !type:CEGOAPMoveToTargetAction
      selector: !type:CEGOAPSelectorNearestEnemy
      preconditions:
        EnemyVisible: true
      effects:
        EnemyInMeleeRange: true
      cost: 1
      range: 1.5
    - !type:CEGOAPMeleeAttackAction
      selector: !type:CEGOAPSelectorNearestEnemy
      preconditions:
        EnemyInMeleeRange: true
      effects:
        EnemyDead: true
      cost: 1
      useType: Primary
      angleVariation: 5
    - !type:CEGOAPUseAction
      selector: !type:CEGOAPSelectorNearestEnemy
      preconditions:
        EnemyVisible: true
        EnemyInMeleeRange: false
      effects:
        EnemyInMeleeRange: true
      cost: 0.5
      actionPrototype: CEActionFireSlimeJump
    - !type:CEGOAPExploreAction
      effects:
        EnemyVisible: true
      cost: 1
      exploreRadius: 8
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: PointLight
    color: "#ff4a08"
    radius: 2
    energy: 2.0
  - type: MovementSpeedModifier
    baseSprintSpeed: 1.5
  - type: CEWeapon
    spriteRotation: -90
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        range: 0.5
        arcWidth: 40
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Fire: 5
        - !type:ApplyStatusEffectStack
          statusEffect: CEStatusEffectFire
          amount: 1
          max: 2
    animations:
      Primary:
      - anim: SlimeBite
  - type: CEArmor
    flat:
      Fire: 100

# -- Slime Jump (leap toward target) --

- type: entity
  id: CEActionFireSlimeJump
  name: fire slime jump
  description: The slime leaps toward a target.
  categories: [ ForkFiltered ]
  components:
  - type: CEVisualizeRadiusTargetAction
  - type: CEVisualizeAoEZoneAction
    radius: 1
  - type: Action
    useDelay: 6
  - type: TargetAction
    range: 8
    interactOnMiss: false
  - type: EntityTargetAction
    event: !type:CEEntityTargetActionAnimationEvent
      animation: FireSlimeJump

- type: entityEffectAnimation
  id: FireSlimeJump
  movementSpeed: 0
  duration: 1
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/_CE/Effects/fire_whoosh.ogg
        params:
          variation: 0.1
    0.4:
    - !type:Dash
      distance: 4
      speed: 8
    0.65:
    - !type:PlaySound
      sound:
        path: /Audio/Effects/Fluids/splash.ogg
        params:
          variation: 0.1
    - !type:CETileAffectArea
      tileEffect: CETileEffectFire
      effectTarget: User
      radius: 1
      maxStacks: 3
      fallOffFactor: 1

- type: entityEffectAnimation
  id: FireSlimeSpawn
  movementSpeed: 0
  duration: 1
  events:
    0:
    - !type:SpawnEntity
      reparent: true
      effectTarget: User
      spawns:
      - CEEffectFireCreation
    - !type:UserAnimation
      scaleAnimation:
      - time: 0.0
        scale: 2.0, 0.1
      - time: 0.9
        scale: 1.0, 1.0
      colorAnimation:
      - time: 0.0
        color: "#ffffff01"
      - time: 0.9
        color: "#ffffff"
