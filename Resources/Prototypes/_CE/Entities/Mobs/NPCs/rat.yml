- type: entity
  parent:
  - BaseMob
  - CEMobDamageable
  - CEMobCombat
  - CEMobGOAPBase
  id: CEMobRat
  name: rat
  description: TODO
  categories: [ ForkFiltered ]
  components:
  - type: CEGOAPAlarm
    sound:
      path: /Audio/_CE/Mobs/rat2.ogg
      params:
        variation: 0.1
  - type: CEDestructible
    destroyThreshold: 10
  - type: CEGOAP
    goals:
    # Single stupid goal - kill enemies
    - desiredState:
        EnemyDead: true
      priority: 1

    actions:
    # Move to target
    - !type:CEGOAPMoveToTargetAction
      selector: !type:CEGOAPSelectorNearestEnemy
      preconditions:
        EnemyVisible: true
      effects:
        EnemyInMeleeRange: true
    # Attack target
    - !type:CEGOAPMeleeAttackAction
      selector: !type:CEGOAPSelectorNearestEnemy
      preconditions:
        EnemyInMeleeRange: true
      effects:
        EnemyDead: true
      cost: 1
      useType: Primary
      angleVariation: 5
    # Explore
    - !type:CEGOAPExploreAction
      effects:
        EnemyVisible: true
      cost: 1
      exploreRadius: 8
    # Move to enemy's last known position
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Sprite
    drawdepth: Mobs
    sprite: _CE/Mobs/rat.rsi
    layers:
    - state: rat
  - type: MovementSpeedModifier
    baseSprintSpeed: 2.5
  - type: CEWeapon
    spriteRotation: -90
    range: 0.5
    effectSlots:
      OnHit:
      - !type:WeaponArcAttack
        arcWidth: 40
        effects:
        - !type:Damage
          attackType: Melee
          damage:
            types:
              Physical: 5
    animations:
      Primary:
      - anim: RatBite

- type: entity
  id: CERatBiteEffectTelegraphy
  components:
  - type: Sprite
    sprite: Effects/arcs.rsi
    state: disarm
    drawdepth: Effects

- type: entity
  id: CERatBiteEffect
  components:
  - type: Sprite
    sprite: Effects/arcs.rsi
    state: bite
    drawdepth: Effects

- type: entityEffectAnimation
  id: RatBite
  movementSpeed: 0.8
  duration: 0.8
  events:
    0:
    - !type:UsedEntityAnimation
      dummyEntity: CERatBiteEffectTelegraphy
      offsetAnimation:
      - time: 0.0
        offset: 0, -0.3
        easing: QuadIn
      - time: 0.2
        offset: 0, -0.2
        easing: QuadIn

      rotationAnimation:
      - time: 0.0
        rotation: 90

      colorAnimation:
      - time: 0.1
        color: "#ffffff"
      - time: 0.3
        color: "#ffffff00"  # Fade out
        easing: QuadOut
    0.2:
    - !type:UsedEntityAnimation
      dummyEntity: CERatBiteEffect
      offsetAnimation:
      - time: 0.0
        offset: 0, -0.2
        easing: QuadIn
      - time: 0.3
        offset: 0, -0.7
        easing: QuadIn

      rotationAnimation:
      - time: 0.0
        rotation: 90

      colorAnimation:
      - time: 0.1
        color: "#ffffff"
      - time: 0.3
        color: "#ffffff00"  # Fade out
        easing: QuadOut
    - !type:PlaySound
      sound:
        path: /Audio/Effects/bite.ogg
        params:
          variation: 0.1
    0.25:
    - !type:WeaponEffectSlot
      slot: OnHit
    - !type:Dash
      distance: 0.1
