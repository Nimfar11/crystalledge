- type: entity
  abstract: true
  id: CEMobGOAPBase
  categories: [ ForkFiltered ]
  components:
  - type: CEGOAP
  - type: CEGOAPKnowledgeCache
  - type: CEGOAPEyesPerceptor
    visionRadius: 8
  - type: CEGOAPEarsPerceptor
  - type: CEGOAPPainPerceptor
  - type: CEGOAPHasEnemySensor
    entries:
    - conditionKey: EnemyVisible
  - type: CEGOAPRangeToTargetSensor
    entries:
    - conditionKey: EnemyInMeleeRange
      selector: !type:CEGOAPSelectorNearestEnemy
      range: 1
