- type: entityTable
  id: CEHealingPotion
  table: !type:GroupSelector
    children:
    - id: CEConsumablePotionHealingMedium
      weight: 0.5
    - id: CEConsumablePotionRegeneration
      weight: 0.75
    - id: CEConsumablePotionHealingSmall

- type: entityTable
  id: CEManaPotion
  table: !type:GroupSelector
    children:
    - id: CEConsumablePotionManaMedium
      weight: 0.5
    - id: CEConsumablePotionManaSmall

- type: entityTable
  id: CESpecialPotion
  table: !type:GroupSelector
    children:
    - id: CEConsumablePotionFrost
    - id: CEConsumablePotionAlchemicalFire
    - id: CEConsumablePotionAcceleration
    - id: CEConsumablePotionShield

- type: entityTable
  id: CEEmptyVials
  table: !type:GroupSelector
    children:
    - id: CEPotionEmptyMedium
    - id: CEPotionEmptySmall
    - id: CEPotionEmptyCube
    - id: CEPotionEmptyStar

- type: entityTable
  id: CERandomPotion
  table: !type:GroupSelector
    children:
    - !type:NestedSelector
      tableId: CEEmptyVials
      weight: 0.8
    - !type:NestedSelector
      tableId: CESpecialPotion
      weight: 0.3

- type: entity
  id: CESpawnerRandomPotion
  name: random potion spawner
  parent: MarkerBase
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    layers:
    - state: green
    - sprite: _CE/Objects/Consumable/Potions/medium_bottle.rsi
      state: icon
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: CERandomPotion
      prob: 0.1
