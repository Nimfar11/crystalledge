- type: entity
  id: CEChestWoodenOldFilled
  suffix: Filled
  parent: CEChestWoodenOld
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        # Some additional fills
        - !type:GroupSelector
          rolls: !type:RangeNumberSelector
            range: 1, 2
          prob: 1
          children:
          - !type:NestedSelector
            tableId: CERandomPotion
            weight: 0.25
        - !type:GroupSelector
          prob: 0.1
          children:
          - !type:NestedSelector
            tableId: CERandomInstrument
            weight: 0.3
        - !type:GroupSelector
          prob: 0.1
          children:
          - !type:NestedSelector
            tableId: CERandomCrayon
            weight: 0.3
        - !type:CEMoneySelector
          min: 0
          max: 5
          largeCoinChance: 0.6

- type: entity
  parent: CEChestWooden
  id: CEChestWoodenFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        # Single cool unique item
        - !type:GroupSelector
          rolls: !type:RangeNumberSelector
          prob: 0.5
          children:
          - !type:CELootCategorySelector
            tags:
            - CEWeapon
            - CEAccessory
          - !type:NestedSelector
            tableId: CECommonArmor
            weight: 0.5
        # Some additional fills
        - !type:GroupSelector
          rolls: !type:RangeNumberSelector
            range: 0, 2
          children:
          - !type:NestedSelector
            tableId: CERandomPotion
        - !type:GroupSelector
          prob: 0.3
          children:
          - !type:NestedSelector
            tableId: CERandomInstrument
            weight: 0.3
        - !type:GroupSelector
          prob: 0.3
          children:
          - !type:NestedSelector
            tableId: CERandomCrayon
            weight: 0.3
        - !type:CEMoneySelector
          min: 5
          max: 15
          largeCoinChance: 0.7

- type: entity
  parent: CEChestGold
  id: CEChestGoldFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        # Single cool unique item
        - !type:GroupSelector
          rolls: !type:RangeNumberSelector
            range: 2, 3
          children:
          - !type:CELootCategorySelector
            tags:
            - CEWeapon
            - CEAccessory
          - !type:NestedSelector
            tableId: CECommonArmor
            weight: 0.5
        # Some additional fills
        - !type:GroupSelector
          rolls: !type:RangeNumberSelector
            range: 1, 4
          children:
          - !type:NestedSelector
            tableId: CERandomPotion
        - !type:GroupSelector
          prob: 0.3
          children:
          - !type:NestedSelector
            tableId: CERandomInstrument
            weight: 0.3
        - !type:GroupSelector
          prob: 0.3
          children:
          - !type:NestedSelector
            tableId: CERandomCrayon
            weight: 0.3
        - !type:CEMoneySelector
          min: 15
          max: 50
          largeCoinChance: 0.8
