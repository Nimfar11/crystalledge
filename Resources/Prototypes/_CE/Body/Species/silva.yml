- type: markingsGroup
  id: CESilva
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false


- type: entity
  parent: BaseSpeciesAppearance
  id: CEAppearanceSilva
  categories: [ ForkFiltered, HideSpawnMenu ]
  components:
  - type: Inventory
    templateId: CEHuman
    displacements:
      shirt:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Elf/displacement.rsi
            state: male_shirt
      neck:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: male_neck
          48:
            sprite: _CE/Mobs/Species/Human/displacement48.rsi
            state: male_neck
    femaleDisplacements:
      outerClothing:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_cloak
      cloak:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_cloak
      pants:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_pants
      shirt:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Elf/displacement.rsi
            state: female_shirt
      neck:
        sizeMaps:
          32:
            sprite: _CE/Mobs/Species/Human/displacement.rsi
            state: female_neck
          48:
            sprite: _CE/Mobs/Species/Human/displacement48.rsi
            state: female_neck
  - type: InitialBody
    organs:
      Torso: CEOrganSilvaTorso
      Head: CEOrganSilvaHead
      ArmLeft: CEOrganSilvaArmLeft
      ArmRight: CEOrganSilvaArmRight
      HandRight: CEOrganSilvaHandRight
      HandLeft: CEOrganSilvaHandLeft
      LegLeft: CEOrganSilvaLegLeft
      LegRight: CEOrganSilvaLegRight
      FootLeft: CEOrganSilvaFootLeft
      FootRight: CEOrganSilvaFootRight
      Eyes: CEOrganSilvaEyes
  - type: HumanoidProfile
    species: CESilva

- type: entity
  parent:
  - CEBaseSpeciesMob
  - CEAppearanceSilva
  id: CEMobSilva
  name: Mr. Silva

# Base silva organ
- type: entity
  parent: OrganBase
  id: CEOrganSilva
  categories: [ ForkFiltered ]
  abstract: true
  suffix: silva

- type: entity
  parent: CEOrganSilva
  id: CEOrganSilvaExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _CE/Mobs/Species/Silva/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _CE/Mobs/Species/Silva/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: CESilva

# Sexed organs (head & torso have _m/_f sprite variants)
- type: entity
  parent: [ CEOrganBaseTorsoNonSexed, OrganBaseTorso, CEOrganSilvaExternal ]
  id: CEOrganSilvaTorso

- type: entity
  parent: [ CEOrganBaseHeadNonSexed, OrganBaseHead, CEOrganSilvaExternal ]
  id: CEOrganSilvaHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout

- type: entity
  parent: [ CEOrganBaseArmLeftNonSexed, OrganBaseArmLeft, CEOrganSilvaExternal ]
  id: CEOrganSilvaArmLeft

- type: entity
  parent: [ CEOrganBaseArmRightNonSexed, OrganBaseArmRight, CEOrganSilvaExternal ]
  id: CEOrganSilvaArmRight

- type: entity
  parent: [ CEOrganBaseHandLeftNonSexed, OrganBaseHandLeft, CEOrganSilvaExternal ]
  id: CEOrganSilvaHandLeft

- type: entity
  parent: [ CEOrganBaseHandRightNonSexed, OrganBaseHandRight, CEOrganSilvaExternal ]
  id: CEOrganSilvaHandRight

- type: entity
  parent: [ CEOrganBaseLegLeftNonSexed, OrganBaseLegLeft, CEOrganSilvaExternal ]
  id: CEOrganSilvaLegLeft

- type: entity
  parent: [ CEOrganBaseLegRightNonSexed, OrganBaseLegRight, CEOrganSilvaExternal ]
  id: CEOrganSilvaLegRight

- type: entity
  parent: [ CEOrganBaseFootLeftNonSexed, OrganBaseFootLeft, CEOrganSilvaExternal ]
  id: CEOrganSilvaFootLeft

- type: entity
  parent: [ CEOrganBaseFootRightNonSexed, OrganBaseFootRight, CEOrganSilvaExternal ]
  id: CEOrganSilvaFootRight

- type: entity
  parent: [ OrganBaseEyes, OrganHumanInternal, CEOrganSilvaExternal ]
  id: CEOrganSilvaEyes
  components:
  - type: VisualOrgan
    data:
      sprite: _CE/Mobs/Customization/eyes.rsi
      state: silva_eyes
