- type: skill
  parent: BaseMageSkill
  id: FireWave
  effect: !type:AddAction
    action: CEActionFireWave

- type: entity
  id: CEActionFireWave
  parent: CEActionSpellBase
  name: Fire wave
  description: You unleash a wave of [color=#ff4500]fire[/color], dealing massive [color=#ff4500]fire[/color] damage in close distance.
  components:
  - type: CEVisualizeConeAction
    width: 90
    range: 3
  - type: CEActionManaCost
    manaCost: 15
  - type: Action
    useDelay: 3
    icon:
      sprite: _CE/Skills/Mage/fire_wave.rsi
      state: icon
  - type: TargetAction
    checkCanAccess: false
    range: 20
  - type: WorldTargetAction
    event: !type:CEWorldTargetActionAnimationEvent
      animation: AnimationFireWave

- type: entityEffectAnimation
  id: AnimationFireWave
  movementSpeed: 0.3
  duration: 0.7
  lockRotation: true
  events:
    0:
    - !type:ShootProjectile
      projectileSpeed: 3
      projectileMaxSpeed: 4
      prototype: CEProjectileFireWave
      projectileCount: 10
      spread: 0.2

- type: entity
  id: CEProjectileFireWave
  name: fire wave
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/StatusEffects/fire_status.rsi
    layers:
    - state: effect
      shader: unshaded
  - type: PointLight
    color: "#fa9c29"
    radius: 1.5
  - type: TimedDespawn
    lifetime: 0.75
  - type: LightBehaviour
    behaviours:
      - !type:PulseBehaviour
        interpolate: Linear
        maxDuration: 0.75
        startValue: 0
        endValue: 5.0
        property: Energy
        isLooped: false
        enabled: true
  - type: CEProjectile
    hitEffects:
    - !type:Damage
      attackType: Ranged
      damage:
        types:
          Fire: 1
    - !type:ApplyStatusEffectStack
      statusEffect: CEStatusEffectFire
      amount: 1
      max: 5
