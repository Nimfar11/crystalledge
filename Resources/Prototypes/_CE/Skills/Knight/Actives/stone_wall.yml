- type: skill
  parent: BaseKnightSkill
  id: StoneWall
  effect: !type:AddAction
    action: CEActionStoneWall

- type: entity
  id: CEActionStoneWall
  parent: CEActionSpellBase
  name: Stone Wall
  description: You raise a [color=#aaaaaa]stone barrier[/color], flinging everyone upward at the point of summoning.
  components:
  - type: CEVisualizeRadiusTargetAction
  - type: CEVisualizeAoEZoneAction
    radius: 0.8
  - type: CEActionManaCost
    manaCost: 5
  - type: CEActionStaminaCost
    cost: 3
  - type: Action
    useDelay: 1
    icon:
      sprite: _CE/Skills/Knight/stone_wall.rsi
      state: icon
  - type: TargetAction
    repeat: true
    range: 3
  - type: WorldTargetAction
    event: !type:CEWorldTargetActionAnimationEvent
      animation: AnimationStoneWall

- type: entityEffectAnimation
  id: AnimationStoneWall
  movementSpeed: 0.6
  duration: 0.3
  events:
    0:
    - !type:PlaySound
      sound:
        path: /Audio/Effects/break_stone.ogg
        params:
          variation: 0.02
    - !type:SpawnEntity
      spawns:
      - CEStoneBarrier
      - CEDustTileEffect
    - !type:ShockWaveVFX
      effectTarget: Target
      width: 0.1
    0.2:
    - !type:AreaEffect
      affectCaster: true
      range: 1
      effects:
      - !type:AddZVelocity
        speed: 5

- type: entity
  id: CEStoneBarrier
  name: stone barrier
  description: A large stone block, summoned using earth magic, that blocks the way.
  categories: [ ForkFiltered ]
  parent: BaseStructureDynamic
  components:
  - type: Icon
    sprite: _CE/Structures/Nature/stone_barrier.rsi
    state: full
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    sprite: _CE/Structures/Nature/stone_barrier.rsi
    state: full
  - type: InteractionOutline
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 3000
  - type: CEDamageable
  - type: Climbable
  - type: CEDestructible
    destroyThreshold: 50
    destroySound:
      path: /Audio/Effects/break_stone.ogg
  - type: CEDestructionEffect
    effects:
    - !type:SpawnEntity
      spawns:
      - CEDustTileEffect
  - type: CEPermanentStatusEffects
    effects:
    - CEStatusEffectStoneBarrier


- type: entity
  id: CEStatusEffectStoneBarrier
  components:
  - type: StatusEffect
  - type: CEArmor
    flat:
      Physical: 3
  - type: CEEffectOnLandingStatusEffect
    effects:
    - !type:ShockWaveVFX
      effectTarget: User
      width: 0.1
    - !type:AreaEffect
      range: 2
      affectCaster: false
      effects:
      - !type:Damage
        effectTarget: Target
        attackType: Melee
        damage:
          types:
            Physical: 10
      - !type:ThrowFromUser
        effectTarget: Target
        distance: 1
        throwPower: 10
  - type: CEEffectOnHighSpeedImpactStatusEffect
    minimumSpeed: 5
    effects:
    - !type:Damage
      effectTarget: Target
      attackType: Other
      damage:
        types:
          Physical: 25
    - !type:ThrowFromUser
      effectTarget: Target
      distance: 1
      throwPower: 5
    - !type:ShockWaveVFX
      effectTarget: Target
      width: 0.1
    - !type:SpawnEntity
      effectTarget: Target
      spawns:
      - CEDustTileEffect
