- type: skill
  parent: BasePriestSkill
  id: RegenerationBurst
  effect: !type:AddAction
    action: CEActionRegenerationBurst

- type: entity
  id: CEActionRegenerationBurst
  parent: CEActionSpellBase
  name: Regeneration Burst
  description: You release a burst of healing projectiles that applies [color=#1defa9]Regeneration[/color] to targets.
  components:
  - type: CEActionDangerous
  - type: CEVisualizeConeAction
    width: 10
  - type: CEActionManaCost
    manaCost: 3
  - type: Action
    useDelay: 6
    icon:
      sprite: _CE/Skills/Neutral/todo.rsi
      state: icon
  - type: TargetAction
    range: 20
  - type: WorldTargetAction
    event: !type:CEWorldTargetActionAnimationEvent
      animation: AnimationRegenerationBurst

- type: entityEffectAnimation
  id: AnimationRegenerationBurst
  movementSpeed: 0.3
  duration: 0.7
  lockRotation: true
  events:
    0:
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectHealingGeneric
    - !type:SayChat
      sentence: "Sana vulnera"
    0.4:
    - !type:ShootProjectile
      projectileSpeed: 3
      prototype: CEProjectileRegenerationBurst
      projectileCount: 3
      spread: 0.2
    - !type:ShootProjectile
      projectileSpeed: 4
      prototype: CEProjectileRegenerationBurst
      projectileCount: 2
      spread: 0.1
    - !type:ShootProjectile
      projectileSpeed: 5
      prototype: CEProjectileRegenerationBurst
      projectileCount: 1

- type: entity
  id: CEProjectileRegenerationBurst
  name: regeneration burst
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _CE/Effects/cold_slowdown_status.rsi
    layers:
    - state: effect
      shader: unshaded
      color: "#30f5b7"
  - type: PointLight
    color: "#30f5b7"
    radius: 1.8
    energy: 4.0
  - type: CEProjectile
    hitEffects:
    - !type:ApplyStatusEffectStack
      statusEffect: CEStatusEffectRegeneration
      amount: 1
      max: 10
    - !type:SpawnEntity
      spawns:
      - CEEffectHealingGeneric
