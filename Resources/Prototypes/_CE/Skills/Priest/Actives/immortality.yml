- type: skill
  parent: BasePriestSkill
  id: Immortality
  effect: !type:AddAction
    action: CEActionSpellImmortality

- type: entity
  id: CEActionSpellImmortality
  parent: CEActionSpellBase
  name: Immortality
  description: You channel divine energy into yourself, applying 5 stacks of [color=#1defa9]Regeneration[/color].
  components:
  - type: CEActionManaCost
    manaCost: 3
  - type: Action
    useDelay: 15
    icon:
      sprite: _CE/Skills/Neutral/todo.rsi
      state: icon
  - type: InstantAction
    event: !type:CEInstantActionAnimationEvent
      animation: AnimationImmortality

- type: entityEffectAnimation
  id: AnimationImmortality
  movementSpeed: 0.5
  duration: 1.5
  events:
    0:
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectHealingGeneric
    - !type:SayChat
      sentence: "Vita aeterna"
    0.8:
    - !type:SpawnEntity
      effectTarget: User
      spawns:
      - CEEffectHealingGeneric
    - !type:ApplyStatusEffectStack
      effectTarget: User
      statusEffect: CEStatusEffectRegeneration
      amount: 5
